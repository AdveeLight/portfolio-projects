backend:
  name: git-gateway
  branch: main

# This makes the Netlify Identity widget log people in via Git Gateway,
# so anyone you invite as a site collaborator can publish through /admin.
publish_mode: editorial_workflow

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Portfolio Projects"
    label_singular: "Project"
    folder: "projects"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} — {{industry}}"
    identifier_field: name
    fields:
      - { label: "Project ID (lowercase, no spaces — used in the page URL)", name: "id", widget: "string", hint: "e.g. vk3, nictralane, my-new-brand" }
      - { label: "Business / Brand Name", name: "name", widget: "string" }
      - { label: "Industry / Category", name: "industry", widget: "string" }
      - { label: "Category (shown as the small label above the title)", name: "category", widget: "string" }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "My Role", name: "role", widget: "string" }
      - { label: "Card Tag (short label shown on the project card)", name: "tag", widget: "string" }

      - { label: "Brief Description (used on cards)", name: "desc", widget: "text" }
      - { label: "Full Brief / The Problem", name: "brief", widget: "text" }
      - { label: "Project Overview", name: "overview", widget: "text" }
      - { label: "Focus (the core design intent in one line)", name: "focus", widget: "string", required: false }

      - label: "Process Steps"
        name: "process"
        widget: "list"
        required: false
        hint: "Add one entry per step, in order (e.g. Discovery & Brand Strategy Session, Moodboarding & Direction, Logo Concepts, Refinement, Final Delivery)"
        field: { label: "Step", name: "step", widget: "string" }

      - label: "Skills & Deliverables"
        name: "deliverables"
        widget: "list"
        hint: "e.g. Logo Design, Brand Strategy, Brand Identity & Guidelines"
        field: { label: "Item", name: "item", widget: "string" }

      - label: "Skills (shown as tags — usually same as deliverables)"
        name: "skills"
        widget: "list"
        field: { label: "Skill", name: "skill", widget: "string" }

      - { label: "Outcome / Result", name: "outcome", widget: "text", required: false, hint: "How the client responded, what changed for them, etc." }

      - { label: "Hero Image (main image shown at the top of the case study)", name: "heroImage", widget: "image", required: false, media_library: { config: { multiple: false } }, hint: "Upload directly, or paste an image URL. Google Drive 'share' links do NOT work directly — see the note in the admin guide for the correct Drive format." }

      - label: "Project Gallery (all supporting images — from your computer or Google Drive)"
        name: "images"
        widget: "list"
        required: false
        hint: "Upload directly, or paste a direct image URL per entry. Google Drive 'share' links need to be converted first — see the admin guide."
        field: { label: "Image", name: "image", widget: "image" }

      - { label: "Card Background Color 1 (dark gradient start, hex)", name: "color1", widget: "color", required: false, default: "#262626" }
      - { label: "Card Background Color 2 (dark gradient end, hex)", name: "color2", widget: "color", required: false, default: "#0A0A0A" }
      - { label: "Accent Color (hex)", name: "accent", widget: "color", required: false, default: "#FF4400" }
      - { label: "Accent Color — Light variant (hex)", name: "accentLight", widget: "color", required: false, default: "#FF7A47" }

      - label: "Fallback Mark (advanced — leave blank unless you know SVG; only shows if no Hero Image is set)"
        name: "svgContent"
        widget: "text"
        required: false

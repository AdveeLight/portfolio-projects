<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin — Deuwel Yusuf</title>
</head>
<body>

  <!-- ============================================================
       TO DISABLE THE ADMIN PANEL:
       Change the line below from `false` to `true`, save, and push.
       Netlify will redeploy and /admin will show a locked screen
       instead of the editor — no other files need to change.
       ============================================================ -->
  <script>
    window.ADMIN_DISABLED = false;
  </script>

  <div id="locked-screen" style="display:none;font-family:-apple-system,sans-serif;max-width:480px;margin:18vh auto;text-align:center;color:#0A0A0A;">
    <h1 style="font-size:22px;margin-bottom:10px;">Admin panel disabled</h1>
    <p style="color:#666;font-size:15px;line-height:1.6;">
      Project editing has been turned off. To re-enable it, set
      <code>window.ADMIN_DISABLED = false</code> in <code>admin/index.html</code> and redeploy.
    </p>
  </div>

  <script>
    if (window.ADMIN_DISABLED) {
      document.getElementById('locked-screen').style.display = 'block';
    } else {
      // Netlify Identity widget: required so Decap CMS can authenticate you
      // against this site via Git Gateway. Without this, the CMS has no
      // logged-in user and will not render.
      var identityScript = document.createElement('script');
      identityScript.src = "https://identity.netlify.com/v1/netlify-identity-widget.js";
      document.body.appendChild(identityScript);

      identityScript.onload = function () {
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("init", (user) => {
            if (!user) {
              window.netlifyIdentity.on("login", () => {
                document.location.href = "/admin/";
              });
            }
          });
        }
        // Decap CMS reads config.yml automatically because it sits next to
        // this file at /admin/config.yml
        var cmsScript = document.createElement('script');
        cmsScript.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
        document.body.appendChild(cmsScript);
      };
    }
  </script>
</body>
</html>
